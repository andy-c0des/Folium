name: Deploy to Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"1Y-FD0gguTdRMtzACZ9O7g2TGNkm8qjuARn_extochw7HEI2xpUPRYJZ7","rootDir":"src"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Refresh token and prune old Apps Script versions
        continue-on-error: true
        run: |
          node <<'EOF'
          const fs = require('fs');
          const scriptId = '1Y-FD0gguTdRMtzACZ9O7g2TGNkm8qjuARn_extochw7HEI2xpUPRYJZ7';
          const keepCount = 5;

          async function main() {
            const rc = JSON.parse(fs.readFileSync(`${process.env.HOME}/.clasprc.json`, 'utf8'));

            // Support both { token: {...} } and { tokens: { default: {...} } } formats
            const tok = (rc.token && rc.token.refresh_token)
              ? rc.token
              : (rc.tokens && rc.tokens.default && rc.tokens.default.refresh_token)
                ? rc.tokens.default
                : null;

            if (!tok) throw new Error('Could not find token with refresh_token in ~/.clasprc.json');

            const body = new URLSearchParams({
              client_id: tok.client_id,
              client_secret: tok.client_secret,
              refresh_token: tok.refresh_token,
              grant_type: 'refresh_token'
            });

            const refreshRes = await fetch('https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body
            });
            if (!refreshRes.ok) throw new Error('Token refresh failed: ' + await refreshRes.text());
            const { access_token } = await refreshRes.json();
            console.log('Access token refreshed');

            const headers = { Authorization: `Bearer ${access_token}` };
            const baseUrl = `https://script.googleapis.com/v1/projects/${scriptId}/versions`;

            // Paginate through all versions
            let allVersions = [];
            let pageToken = '';
            do {
              const url = baseUrl + '?pageSize=100' + (pageToken ? '&pageToken=' + pageToken : '');
              const r = await fetch(url, { headers });
              const d = await r.json();
              allVersions = allVersions.concat(d.versions || []);
              pageToken = d.nextPageToken || '';
            } while (pageToken);

            const nums = allVersions.map(v => Number(v.versionNumber)).filter(n => n > 0).sort((a, b) => b - a);
            console.log(`Found ${nums.length} versions. Keeping ${keepCount}, attempting to delete ${Math.max(0, nums.length - keepCount)}.`);
            console.log('Note: Apps Script REST API does not support version deletion — this step is informational only.');
          }

          main().catch(err => { console.error(err.message); process.exit(0); });
          EOF

      - name: Deploy Apps Script (update pinned deployment)
        run: clasp deploy --deploymentId AKfycbxIoMarP6xQS6LCW9HVEDEJf0YfARIYLSTSA-3leipU42wMYiZjMQWxctmoSL2oMa5gYg --description "CI deploy"
