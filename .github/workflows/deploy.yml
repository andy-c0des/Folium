name: Deploy to Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"1pkUc3XrQP8119xlGttdkdxgwwiefm1JsQaVcJr0sK97zhem5hvbHXbsn","rootDir":"src"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy Apps Script (update pinned deployment)
        run: clasp deploy --deploymentId AKfycbw1EMhF1Mhqxtq6pQnM-K-1JkHw5rTesHwsBpaz6FFoNzc5vyzDMLwa8aIJsyjP5_cbyA --description "CI deploy"
